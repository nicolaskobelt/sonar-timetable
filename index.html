<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sónar 2026 — Timetable</title>
<style>
  :root {
    --bg: #0b0b10;
    --panel: #14141c;
    --grid: #23232f;
    --text: #e8e8f0;
    --muted: #8a8aa0;
    --accent: #ff3b6b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 16px 24px; border-bottom: 1px solid var(--grid); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  h1 { margin: 0; font-size: 18px; letter-spacing: .04em; text-transform: uppercase; }
  .tabs { display: flex; gap: 4px; }
  .tab { background: var(--panel); color: var(--muted); border: 1px solid var(--grid); padding: 6px 14px; border-radius: 999px; cursor: pointer; font: inherit; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .legend { color: var(--muted); margin-left: auto; font-size: 12px; }

  .grid-wrap { padding: 16px; overflow: auto; }
  .grid {
    position: relative;
    display: grid;
    background: var(--panel);
    border: 1px solid var(--grid);
    border-radius: 8px;
  }
  .corner, .col-head, .row-head {
    background: var(--panel);
    border-right: 1px solid var(--grid);
    border-bottom: 1px solid var(--grid);
    padding: 8px;
    font-size: 12px;
    color: var(--muted);
    position: sticky;
    z-index: 2;
  }
  .col-head { top: 0; text-align: center; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: .04em; }
  .row-head { left: 0; text-align: right; font-variant-numeric: tabular-nums; }
  .corner { top: 0; left: 0; z-index: 3; }

  .cell { border-right: 1px solid var(--grid); border-bottom: 1px solid var(--grid); }

  .act {
    position: absolute;
    background: linear-gradient(135deg, #ff3b6b, #9b2bff);
    color: #fff;
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
    line-height: 1.25;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.35);
    border: 1px solid rgba(255,255,255,.08);
  }
  .act .title { font-weight: 700; }
  .act .time { opacity: .85; font-variant-numeric: tabular-nums; font-size: 11px; margin-top: 2px; }

  /* color per stage */
  .s-SonarVillage { background: linear-gradient(135deg,#ff8a3d,#ff3b6b); }
  .s-SonarHall    { background: linear-gradient(135deg,#3dc6ff,#5b6bff); }
  .s-SonarClub    { background: linear-gradient(135deg,#9b2bff,#ff3bd1); }
  .s-SonarPark    { background: linear-gradient(135deg,#3dffa0,#3dc6ff); }
  .s-SonarCar     { background: linear-gradient(135deg,#ffd23d,#ff8a3d); }
  .s-SonarLab     { background: linear-gradient(135deg,#ff3bd1,#9b2bff); }
  .s-Installations{ background: linear-gradient(135deg,#5b6bff,#3dffa0); }

  @media (max-width: 700px) {
    header { padding: 12px; gap: 8px; }
    h1 { font-size: 14px; flex-basis: 100%; }
    .tab { padding: 5px 10px; font-size: 12px; }
    .legend { display: none; }
    .grid-wrap { padding: 8px; -webkit-overflow-scrolling: touch; }
    .col-head { font-size: 10px; padding: 6px 4px; }
    .row-head { font-size: 10px; padding: 4px; }
    .act { font-size: 11px; padding: 4px 6px; border-radius: 4px; }
    .act .time { font-size: 10px; }
  }
</style>
</head>
<body>
<header>
  <h1>Sónar 2026 — Timetable</h1>
  <div class="tabs" id="tabs"></div>
  <div class="legend">Y = hour · X = stage · box = set length</div>
</header>
<div class="grid-wrap"><div class="grid" id="grid"></div></div>

<script>
// Each file represents one night session starting at 17:00 and continuing past midnight.
const SESSIONS = [
  { file: 'friday.json',   label: 'Fri 19 Jun → Sat' },
  { file: 'saturday.json', label: 'Sat 20 Jun → Sun' },
];
const SESSION_START = 17 * 60; // 17:00 anchor
const isMobile = () => window.matchMedia('(max-width: 700px)').matches;
function metrics(){
  const m = isMobile();
  return { ROW_PX: m?80:60, COL_PX: m?110:200, HEAD_H: m?44:36, HEAD_W: m?46:70 };
}
const SLOT_MIN = 15;       // minor grid every 15 min

function parseHHMM(s){ const [h,m]=s.split(':').map(Number); return h*60+m; }

// Load each file as its own session (Fri-night, Sat-night)
Promise.all(SESSIONS.map(s => fetch(s.file).then(r => r.json())))
  .then(arrs => {
    const bySession = {};
    arrs.forEach((arr, idx) => {
      const sess = SESSIONS[idx].file;
      const acts = [];
      const seen = new Set();
      for (const item of arr.data){
        for (const s of (item.schedules||[])){
          if (!s.start_hour || !s.end_hour || !s.stage) continue;
          if (s.stage.name.trim() === 'Installations') continue;
          const key = `${item.title}|${s.start_hour}|${s.stage.name}`;
          if (seen.has(key)) continue;
          seen.add(key);
          acts.push({
            title: item.title.trim(),
            start: s.start_hour.slice(0,5),
            end: s.end_hour.slice(0,5),
            stage: s.stage.name.trim(),
          });
        }
      }
      bySession[sess] = acts;
    });
    renderTabs(bySession);
    let current = SESSIONS[0].file;
    renderDay(current, bySession);
    // re-render on viewport changes so mobile/desktop metrics swap in
    let last = isMobile();
    window.addEventListener('resize', () => {
      const now = isMobile();
      if (now !== last){ last = now; renderDay(current, bySession); }
    });
    // expose the current selector to renderTabs
    window.__setCurrent = f => { current = f; renderDay(current, bySession); };
  });

function renderTabs(bySession){
  const t = document.getElementById('tabs');
  SESSIONS.forEach((s,i) => {
    const b = document.createElement('button');
    b.className = 'tab' + (i===0?' active':'');
    b.textContent = s.label;
    b.onclick = () => {
      [...t.children].forEach(c=>c.classList.remove('active'));
      b.classList.add('active');
      window.__setCurrent(s.file);
    };
    t.appendChild(b);
  });
}

function stageClass(name){
  if (name.startsWith('SonarVillage')) return 's-SonarVillage';
  if (name.startsWith('SonarHall'))    return 's-SonarHall';
  if (name.startsWith('SonarClub'))    return 's-SonarClub';
  if (name.startsWith('SonarPark'))    return 's-SonarPark';
  if (name.startsWith('SonarCar'))     return 's-SonarCar';
  if (name.startsWith('SonarLab'))     return 's-SonarLab';
  return 's-Installations';
}

// Convert HH:MM to "minutes since 17:00 anchor": any time before 17:00 is next-day.
function sessionMin(hhmm){
  const m = parseHHMM(hhmm);
  return m < SESSION_START ? m + 24*60 : m;
}

function renderDay(sessionKey, bySession){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const acts = bySession[sessionKey] || [];
  if (!acts.length){ grid.textContent = 'No schedule for this session.'; return; }

  // Anchor: 17:00. Everything mapped into minutes-since-anchor.
  const starts = acts.map(a => sessionMin(a.start));
  const ends   = acts.map(a => {
    let s = sessionMin(a.start), e = sessionMin(a.end);
    if (e <= s) e += 24*60; // safety
    return e;
  });
  const startMin = Math.floor(Math.min(...starts)/60)*60;
  const endMin   = Math.ceil(Math.max(...ends)/60)*60;
  const { ROW_PX, COL_PX, HEAD_H, HEAD_W } = metrics();

  const STAGE_ORDER = ['SonarVillage by Estrella Damm','SonarHall','SonarClub','SonarPark','SonarLab x Rinse','SonarCar'];
  const stages = [...new Set(acts.map(a=>a.stage))]
    .sort((a,b) => {
      const ia = STAGE_ORDER.indexOf(a), ib = STAGE_ORDER.indexOf(b);
      return (ia<0?999:ia) - (ib<0?999:ib);
    });
  const totalRows = (endMin-startMin)/60;

  grid.style.gridTemplateColumns = `${HEAD_W}px repeat(${stages.length}, ${COL_PX}px)`;
  grid.style.gridTemplateRows    = `${HEAD_H}px ${ROW_PX*totalRows}px`;

  // corner
  const corner = el('div','corner'); grid.appendChild(corner);
  // column headers
  stages.forEach(s => {
    const h = el('div','col-head'); h.textContent = s; grid.appendChild(h);
  });

  // body cell area — single cell that spans all stages, we'll absolutely position acts within
  const bodyHeads = el('div'); // row headers container
  bodyHeads.style.position='relative';
  bodyHeads.style.gridColumn = '1 / 2';
  bodyHeads.style.gridRow    = '2 / 3';
  for (let i=0; i<totalRows; i++){
    const m = (startMin + i*60);
    const hh = String(Math.floor((m/60)%24)).padStart(2,'0');
    const r = el('div','row-head');
    r.style.position='absolute';
    r.style.top = (i*ROW_PX)+'px';
    r.style.left='0'; r.style.right='0';
    r.style.height = ROW_PX+'px';
    r.textContent = `${hh}:00`;
    bodyHeads.appendChild(r);
  }
  grid.appendChild(bodyHeads);

  const body = el('div'); // grid body
  body.style.position = 'relative';
  body.style.gridColumn = `2 / ${2+stages.length}`;
  body.style.gridRow = '2 / 3';

  // draw stage columns (background grid + hour lines)
  stages.forEach((_,ci) => {
    for (let i=0; i<totalRows; i++){
      const c = el('div','cell');
      c.style.position='absolute';
      c.style.left = (ci*COL_PX)+'px';
      c.style.top  = (i*ROW_PX)+'px';
      c.style.width = COL_PX+'px';
      c.style.height = ROW_PX+'px';
      body.appendChild(c);
    }
  });

  // place acts
  acts.forEach(a => {
    let s = sessionMin(a.start), e = sessionMin(a.end);
    if (e <= s) e += 24*60;
    const ci = stages.indexOf(a.stage);
    const top  = ((s - startMin)/60) * ROW_PX;
    const h    = ((e - s)/60) * ROW_PX;
    const box = el('div', 'act ' + stageClass(a.stage));
    box.style.left = (ci*COL_PX + 4) + 'px';
    box.style.width = (COL_PX - 8) + 'px';
    box.style.top = (top + 2) + 'px';
    box.style.height = (h - 4) + 'px';
    box.innerHTML = `<div class="title">${escapeHTML(a.title)}</div><div class="time">${a.start} – ${a.end}</div>`;
    body.appendChild(box);
  });

  grid.appendChild(body);
}

function el(tag, cls){ const n=document.createElement(tag); if(cls) n.className=cls; return n; }
function escapeHTML(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
